<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Artificial Selection Simulation</title>

  <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --selected: #7c3aed;
      --selected-soft: rgba(124, 58, 237, 0.12);
      --button: #111827;
      --button-disabled: #9ca3af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transform: scale(0.67);
      transform-origin: top left;
      width: 149.25%;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
    }

    .subtitle {
      margin: 0 0 24px 0;
      color: var(--muted);
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }

    .info-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    #debug-log {
      background: white;
      border: 2px solid red;
      padding: 12px;
      min-height: 40px;
      margin-bottom: 18px;
      white-space: pre-wrap;
    }

    .control-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    .controls button {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      background: var(--button);
      color: white;
    }

    .controls button:disabled {
      background: var(--button-disabled);
      cursor: not-allowed;
    }

    .tabs {
      display: flex;
      gap: 10px;
    }

    .tab-btn {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.95rem;
    }

    .tab-btn.active {
      background: var(--button);
      color: white;
    }

    #population {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 18px;
    }

    .pattern-card {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      padding: 14px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .pattern-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .pattern-card.selected {
      border-color: var(--selected);
      box-shadow: 0 0 0 4px var(--selected-soft);
    }

    .pattern-label {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .pattern-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      border-radius: 12px;
      border: 1px solid var(--border);
      image-rendering: pixelated;
      margin-bottom: 10px;
      background: #eee;
    }

    .pattern-helper {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .history-generation {
      margin-bottom: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .history-title {
      font-weight: 700;
      margin-bottom: 12px;
    }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .history-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
      image-rendering: pixelated;
      background: #eee;
    }

    .history-image.history-selected {
      border: 1px solid white;
      box-shadow:
        0 0 0 1px white,
        0 0 0 4px var(--selected);
    }

    @media (max-width: 900px) {
      #population {
        grid-template-columns: repeat(2, 1fr);
      }

      .history-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 600px) {
      .control-bar {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .tabs {
        justify-content: flex-end;
      }

      #population {
        grid-template-columns: 1fr;
      }

      .history-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Artificial Selection Simulation</h1>
    <p class="subtitle">Click two patterns to select parents for the next generation.</p>

    <div class="topbar">
      <div class="info-box" id="generation">Generation 1</div>
      <div class="info-box" id="status">Loading...</div>
    </div>

    <pre id="debug-log" hidden></pre>

    <div class="control-bar">
      <div class="controls">
        <button id="next-btn" disabled>Next Generation</button>
        <button id="reset-btn">Reset</button>
      </div>

      <div class="tabs">
        <button id="current-tab" class="tab-btn active">Current Generation</button>
        <button id="history-tab" class="tab-btn">History</button>
      </div>
    </div>

    <div id="current-view">
      <div id="population"></div>
    </div>

    <div id="history-view" hidden>
      <div id="history"></div>
    </div>
  </div>

  <script type="py" src="./main.py?v=debug3"></script>
</body>
</html>
